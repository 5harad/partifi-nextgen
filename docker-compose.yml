x-worker-service: &worker-service
  build:
    context: .
    dockerfile: workers/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    MYSQL_HOST: mysql
    REDIS_URL: redis://redis:6379/0
    S3_ENDPOINT_URL: http://minio:9000
    PARTIFI_CACHE_ROOT: /data/partifi
  volumes:
    - ./workers:/app
    - ./pipeline:/app/pipeline
    - worker_venv:/app/.venv
    - worker_tmp:/tmp/partifi
    - partifi_cache:/data/partifi
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-partifi}
      MYSQL_USER: ${MYSQL_USER:-partifi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-partifi_dev_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      PARTIFI_CACHE_ROOT: /data/partifi
    ports:
      - "8001:8000"
    volumes:
      - ./api:/app
      - ./pipeline:/app/pipeline
      - api_venv:/app/.venv
      - api_tmp:/tmp/partifi
      - partifi_cache:/data/partifi
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-1:
    <<: *worker-service

  worker-2:
    <<: *worker-service

  worker-3:
    <<: *worker-service

volumes:
  mysql_data:
  minio_data:
  api_venv:
  worker_venv:
  api_tmp:
  worker_tmp:
  partifi_cache:
