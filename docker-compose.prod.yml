x-journald-logging: &journald-logging
  logging:
    driver: journald
    options:
      tag: "partifi/{{.Name}}"

x-json-logging: &json-logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

x-worker-service: &worker-service
  <<: *journald-logging
  build:
    context: .
    dockerfile: workers/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    MYSQL_HOST: mysql
    REDIS_URL: redis://redis:6379/0
    PARTIFI_CACHE_ROOT: /data/partifi
  volumes:
    - worker_tmp:/tmp/partifi
    - partifi_cache:/data/partifi
  deploy:
    resources:
      limits:
        memory: 4G
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  web:
    <<: *journald-logging
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_MAX_SCORE_MB: ${PARTIFI_MAX_SCORE_MB:-250}
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-partifi.org}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

  api:
    <<: *journald-logging
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      PARTIFI_CACHE_ROOT: /data/partifi
    volumes:
      - partifi_cache:/data/partifi
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    <<: *json-logging
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-partifi}
      MYSQL_USER: ${MYSQL_USER:-partifi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # Dedicated EBS (or host path) for MySQL; see scripts/migrate_mysql_to_ebs.sh
      - /mnt/mysql-ebs:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/mysql/prod.cnf:/etc/mysql/conf.d/99-prod.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    <<: *json-logging
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker-1:
    <<: *worker-service

  worker-2:
    <<: *worker-service

  worker-3:
    <<: *worker-service

volumes:
  worker_tmp:
  partifi_cache:
  caddy_data:
  caddy_config:
