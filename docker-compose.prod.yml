x-worker-service: &worker-service
  build:
    context: .
    dockerfile: workers/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    MYSQL_HOST: mysql
    REDIS_URL: redis://redis:6379/0
  volumes:
    - worker_tmp:/tmp/partifi
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-partifi.org}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-partifi}
      MYSQL_USER: ${MYSQL_USER:-partifi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker-1:
    <<: *worker-service

  worker-2:
    <<: *worker-service

  worker-3:
    <<: *worker-service

volumes:
  mysql_data:
  worker_tmp:
  caddy_data:
  caddy_config:
